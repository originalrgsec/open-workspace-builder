[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "claude-workspace-builder"
version = "0.1.0"
description = "Scaffold, maintain, and secure Claude Code and Cowork workspaces"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{name = "Volcanix LLC", email = "info@volcanix.io"}]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Build Tools",
]
dependencies = [
    "click>=8.0",
]

[project.optional-dependencies]
yaml = [
    "pyyaml>=6.0",
]
security = [
    "pyyaml>=6.0",
    "anthropic>=0.30.0",
]
dev = [
    "pytest>=7.0",
    "ruff>=0.1.0",
    "build",
]

[project.urls]
Homepage = "https://github.com/VolcanixLLC/claude-workspace-builder"
Repository = "https://github.com/VolcanixLLC/claude-workspace-builder"
Issues = "https://github.com/VolcanixLLC/claude-workspace-builder/issues"

[project.scripts]
cwb = "claude_workspace_builder.cli:cwb"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
claude_workspace_builder = ["py.typed", "security/data/*.yaml"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
