[build-system]
requires = ["setuptools>=68.0", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "claude-workspace-builder"
version = "0.1.0"
description = "Scaffold, maintain, and secure Claude Code and Cowork workspaces"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "Volcanix LLC", email = "info@volcanix.io"}]
dependencies = [
    "click>=8.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.1.0",
]
yaml = [
    "pyyaml>=6.0",
]
security = [
    "pyyaml>=6.0",
    "anthropic>=0.30.0",
]

[project.scripts]
cwb = "claude_workspace_builder.cli:cwb"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
claude_workspace_builder = ["py.typed", "security/data/*.yaml"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
