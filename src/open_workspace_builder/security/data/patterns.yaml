# Security patterns for workspace content scanning.
# 58 patterns across 12 categories.

categories:
  exfiltration:
    description: "Data exfiltration instructions"
    patterns:
      - id: exfil-001
        pattern: "curl\\s+.*(-d|--data)\\s+.*\\$"
        severity: critical
        description: "curl POST with variable data — potential data exfiltration"
        false_positive_hint: "Legitimate if documenting curl usage without variable interpolation"
      - id: exfil-002
        pattern: "wget\\s+.*--post-(data|file).*\\$"
        severity: critical
        description: "wget POST with variable data — potential data exfiltration"
        false_positive_hint: "Legitimate in download documentation"
      - id: exfil-003
        pattern: "\\bfetch\\s*\\(.*body\\s*:.*\\benv\\b"
        severity: critical
        description: "fetch() sending environment data"
        false_positive_hint: "Legitimate in API client documentation"
      - id: exfil-004
        pattern: "send.*to.*https?://"
        severity: warning
        description: "Instruction to send data to external URL"
        false_positive_hint: "Legitimate in webhook or API documentation"
      - id: exfil-005
        pattern: "exfiltrat"
        severity: critical
        description: "Explicit exfiltration language"
        false_positive_hint: "Legitimate in security documentation discussing threats"

  persistence:
    description: "Persistence and backdoor vectors"
    patterns:
      - id: persist-001
        pattern: "crontab\\s+(-e|-l|.*\\*/)"
        severity: critical
        description: "Crontab modification — potential persistence"
        false_positive_hint: "Legitimate in scheduling documentation"
      - id: persist-002
        pattern: "\\.(bashrc|zshrc|profile|bash_profile)\\b"
        severity: warning
        description: "Shell profile modification — potential persistence"
        false_positive_hint: "Legitimate in shell configuration guides"
      - id: persist-003
        pattern: "launchctl\\s+(load|submit)"
        severity: critical
        description: "macOS launch agent installation"
        false_positive_hint: "Legitimate in macOS service documentation"
      - id: persist-004
        pattern: "systemctl\\s+(enable|start)"
        severity: warning
        description: "systemd service installation"
        false_positive_hint: "Legitimate in Linux service documentation"
      - id: persist-005
        pattern: "\\bbackdoor\\b"
        severity: critical
        description: "Explicit backdoor language"
        false_positive_hint: "Legitimate in security education content"

  stealth:
    description: "Stealth and evasion techniques"
    patterns:
      - id: stealth-001
        pattern: "(?i)do\\s+not\\s+(mention|reveal|disclose|tell|show)\\s+.{0,30}(these\\s+instructions?|this\\s+(prompt|to)|the\\s+(above|user))"
        severity: critical
        description: "Instruction to hide behavior or instructions from user"
        false_positive_hint: "General guidance like 'do not reveal API keys' will not match"
      - id: stealth-002
        pattern: "(?i)ignore\\s+(previous|prior|above|all)\\s+(instructions?|rules?|guidelines?)"
        severity: critical
        description: "Prompt injection — override prior instructions"
        false_positive_hint: "Legitimate in prompt engineering education"
      - id: stealth-003
        pattern: "(?i)pretend\\s+(you|that|to\\s+be)"
        severity: warning
        description: "Identity manipulation instruction"
        false_positive_hint: "Legitimate in roleplay or testing documentation"
      - id: stealth-004
        pattern: "(?i)(secretly|covertly|silently)\\s+(add|install|run|execute|modify)"
        severity: critical
        description: "Instruction to perform hidden action"
        false_positive_hint: "None — almost always malicious in workspace content"
      - id: stealth-005
        pattern: "(?i)without\\s+(the\\s+)?user('s)?\\s+(knowledge|knowing|consent|awareness)"
        severity: critical
        description: "Instruction to bypass user awareness"
        false_positive_hint: "Legitimate in UX anti-pattern documentation"

  self_modification:
    description: "Self-modification and instruction override"
    patterns:
      - id: selfmod-001
        pattern: "(?i)modify\\s+(your|these|the)\\s+(own\\s+)?(instructions?|rules?|config)"
        severity: critical
        description: "Instruction to self-modify rules or config"
        false_positive_hint: "Legitimate in meta-programming documentation"
      - id: selfmod-002
        pattern: "(?i)rewrite\\s+(your)\\s+(system\\s+prompt|instructions?|core\\s+rules)|rewrite\\s+(this)\\s+(system\\s+prompt)"
        severity: critical
        description: "Instruction to rewrite own system prompt or instructions"
        false_positive_hint: "Casual usage like 'rewrite this prompt template' will not match"
      - id: selfmod-003
        pattern: "(?i)append.*to.*(CLAUDE\\.md|WORKSPACE\\.md|agent.config)"
        severity: warning
        description: "Instruction to modify agent config file"
        false_positive_hint: "Legitimate in workspace setup documentation"
      - id: selfmod-004
        pattern: "(?i)overwrite\\s+(the\\s+)?(config|settings|rules)"
        severity: critical
        description: "Instruction to overwrite configuration"
        false_positive_hint: "Legitimate in migration documentation"

  encoded:
    description: "Encoded or obfuscated content"
    patterns:
      - id: encoded-001
        pattern: "(?i)base64\\s*(decode|encode|\\-d)"
        severity: warning
        description: "Base64 encoding/decoding operation"
        false_positive_hint: "Legitimate in encoding documentation"
      - id: encoded-002
        pattern: "\\beval\\s*\\("
        severity: warning
        description: "Dynamic code evaluation"
        false_positive_hint: "Legitimate in language documentation"
      - id: encoded-003
        pattern: "\\\\x[0-9a-fA-F]{2}(\\\\x[0-9a-fA-F]{2}){3,}"
        severity: warning
        description: "Hex-encoded string sequence"
        false_positive_hint: "Legitimate in binary protocol documentation"
      - id: encoded-005
        pattern: "\\$\\(.*\\)"
        severity: warning
        description: "Command substitution in shell"
        false_positive_hint: "Legitimate in shell scripting documentation"

  network:
    description: "Suspicious network operations"
    patterns:
      - id: net-001
        pattern: "(?i)reverse\\s+shell"
        severity: critical
        description: "Reverse shell reference"
        false_positive_hint: "Legitimate in CTF or security education"
      - id: net-002
        pattern: "nc\\s+(-e|-c|.*\\|.*sh)"
        severity: critical
        description: "Netcat with shell execution"
        false_positive_hint: "Legitimate in networking documentation"
      - id: net-003
        pattern: "/dev/(tcp|udp)/\\S+"
        severity: critical
        description: "Bash /dev/tcp network redirect"
        false_positive_hint: "Legitimate in advanced bash documentation"
      - id: net-004
        pattern: "(?i)ngrok|serveo|localtunnel"
        severity: warning
        description: "Tunnel service reference"
        false_positive_hint: "Legitimate in development setup documentation"
      - id: net-005
        pattern: "(?i)bind\\s+shell"
        severity: critical
        description: "Bind shell reference"
        false_positive_hint: "Legitimate in security education"

  privilege:
    description: "Privilege escalation and permission changes"
    patterns:
      - id: priv-001
        pattern: "chmod\\s+[0-7]*7[0-7]{2}"
        severity: warning
        description: "chmod with world-writable permission"
        false_positive_hint: "Legitimate in permission documentation"
      - id: priv-002
        pattern: "sudo\\s+chmod|chown"
        severity: warning
        description: "Privileged permission change"
        false_positive_hint: "Legitimate in system administration guides"
      - id: priv-003
        pattern: "(?i)privilege\\s+escalat"
        severity: info
        description: "Privilege escalation language"
        false_positive_hint: "Common in security documentation discussing threat models"
      - id: priv-004
        pattern: "SUID|setuid|setgid"
        severity: warning
        description: "SUID/SGID permission reference"
        false_positive_hint: "Legitimate in Linux security documentation"

  sensitive_paths:
    description: "Access to sensitive file paths"
    patterns:
      - id: path-001
        pattern: "~/.ssh/(id_rsa|id_ed25519|config|authorized_keys)"
        severity: critical
        description: "SSH key or config access"
        false_positive_hint: "Legitimate in SSH setup documentation"
      - id: path-002
        pattern: "~/.aws/(credentials|config)"
        severity: critical
        description: "AWS credentials access"
        false_positive_hint: "Legitimate in AWS setup documentation"
      - id: path-003
        pattern: "\\.env\\b(?!iron)"
        severity: warning
        description: "Environment file access"
        false_positive_hint: "Legitimate in project setup documentation"
      - id: path-004
        pattern: "/etc/(passwd|shadow)"
        severity: critical
        description: "System password file access"
        false_positive_hint: "Legitimate in Linux administration documentation"
      - id: path-005
        pattern: "(?i)(api[_-]?key|secret[_-]?key|access[_-]?token)\\s*[=:]\\s*['\"](?!your[_-]|placeholder|example|replace|changeme|xxx|todo|test[_-]|fake[_-]|dummy|PLACEHOLDER)[^'\"]{8,}"
        severity: critical
        description: "Hardcoded secret value (excludes common placeholders)"
        false_positive_hint: "Placeholder values like 'your-api-key-here' or 'PLACEHOLDER_REPLACE_ME' will not match"

  prompt_injection:
    description: "Prompt injection and behavioral manipulation"
    patterns:
      - id: inject-001
        pattern: "(?i)you\\s+are\\s+(now|no\\s+longer)\\s+a"
        severity: critical
        description: "Identity reassignment injection"
        false_positive_hint: "Legitimate in roleplay documentation"
      - id: inject-002
        pattern: "(?i)system\\s*:\\s*you\\s+are"
        severity: critical
        description: "Fake system prompt injection"
        false_positive_hint: "Legitimate in prompt engineering documentation"
      - id: inject-003
        pattern: "(?i)new\\s+instructions?\\s*:"
        severity: critical
        description: "Instruction override attempt"
        false_positive_hint: "Legitimate in update documentation"
      - id: inject-004
        pattern: "(?i)from\\s+now\\s+on,?\\s+(you\\s+(will|must|should)\\s+(ignore|forget|disregard|never\\s+refuse)|ignore|never\\s+refuse)"
        severity: critical
        description: "Behavioral override instruction — override safety or compliance"
        false_positive_hint: "Legitimate style guide instructions like 'from now on, always use X' will not match"
      - id: inject-005
        pattern: "(?i)</?system>|\\[SYSTEM\\]|\\[INST\\]"
        severity: critical
        description: "Fake markup delimiter injection"
        false_positive_hint: "Legitimate in LLM documentation discussing formats"

  jailbreak:
    description: "Jailbreak preambles and mode activation"
    patterns:
      - id: jailbreak-001
        pattern: "(?i)\\bDAN\\s+(mode|prompt)"
        severity: critical
        description: "DAN (Do Anything Now) jailbreak"
        false_positive_hint: "Legitimate in security research discussing jailbreak techniques"
      - id: jailbreak-002
        pattern: "(?i)developer\\s+mode\\s+(enabled|activated|on)"
        severity: critical
        description: "Developer mode jailbreak"
        false_positive_hint: "Legitimate in developer documentation about debug modes"
      - id: jailbreak-003
        pattern: "(?i)act\\s+as\\s+an?\\s+(unrestricted|unfiltered|uncensored)"
        severity: critical
        description: "Unrestricted mode jailbreak"
        false_positive_hint: "Legitimate in content policy documentation"
      - id: jailbreak-004
        pattern: "(?i)you\\s+have\\s+been\\s+(jailbroken|unlocked|freed)"
        severity: critical
        description: "Jailbreak confirmation framing"
        false_positive_hint: "Legitimate in security research discussing jailbreak techniques"
      - id: jailbreak-005
        pattern: "(?i)ignore\\s+(all\\s+)?safety\\s+(guidelines|protocols|rules|filters)"
        severity: critical
        description: "Safety bypass instruction"
        false_positive_hint: "Legitimate in safety documentation discussing bypass risks"
      - id: jailbreak-006
        pattern: "(?i)opposite\\s+mode|anti-?assistant|chaos\\s+mode"
        severity: critical
        description: "Adversarial mode activation"
        false_positive_hint: "Legitimate in security research discussing adversarial techniques"

  markdown_exfil:
    description: "Markdown and HTML exfiltration vectors"
    patterns:
      - id: mdexfil-001
        pattern: "!\\[.*?\\]\\(https?://[^)]+\\?.*="
        severity: warning
        description: "Markdown image with query parameters (tracking pixel)"
        false_positive_hint: "Legitimate if linking to images with sizing or display parameters"
      - id: mdexfil-002
        pattern: "<iframe\\b"
        severity: critical
        description: "Iframe embed in markdown"
        false_positive_hint: "Legitimate in web development documentation"
      - id: mdexfil-003
        pattern: "<img\\s+src=[\"']https?://"
        severity: warning
        description: "HTML image tag with external source"
        false_positive_hint: "Legitimate in web documentation with image examples"
      - id: mdexfil-004
        pattern: "data:[^;]+;base64,"
        severity: warning
        description: "Data URI (potential encoded payload)"
        false_positive_hint: "Legitimate in web development showing data URI examples"
      - id: mdexfil-005
        pattern: "<!--.*?(script|exec|eval|fetch|XMLHttpRequest).*?-->"
        severity: critical
        description: "Executable code in HTML comments"
        false_positive_hint: "Legitimate in web security documentation discussing comment injection"

  mcp_manipulation:
    description: "MCP/tool manipulation and abuse"
    patterns:
      - id: mcp-001
        pattern: "(?i)tool_use|tool_result|tool_call"
        severity: info
        description: "MCP protocol keyword (expected in agent and tool documentation)"
        false_positive_hint: "Common in MCP documentation or tool development guides"
      - id: mcp-002
        pattern: "(?i)call\\s+the\\s+(tool|function|server)\\s+.*\\s+with"
        severity: warning
        description: "Instruction to invoke a specific tool"
        false_positive_hint: "Legitimate in API or tool documentation"
      - id: mcp-003
        pattern: "(?i)(read|access|fetch)\\s+(?!the\\s+(project|sprint|build|test|session|current|latest|config)\\s).{1,40}\\s+(from|via)\\s+(slack|gmail|drive|obsidian|asana)"
        severity: critical
        description: "Instruction to access connected service data"
        false_positive_hint: "Project-specific reads like 'read the project status from Obsidian' will not match"
      - id: mcp-004
        pattern: "(?i)when\\s+(the|a)\\s+(tool|server)\\s+(returns|responds).*then"
        severity: warning
        description: "Conditional instruction on tool response"
        false_positive_hint: "Legitimate in workflow automation documentation"
      - id: mcp-005
        pattern: "(?i)pipe\\s+.*output.*to|redirect\\s+.*response.*to"
        severity: critical
        description: "Instruction to redirect tool output"
        false_positive_hint: "Legitimate in shell scripting or pipeline documentation"
