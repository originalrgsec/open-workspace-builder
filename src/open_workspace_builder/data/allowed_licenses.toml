# OWB allowed-license policy — runtime authority for SBOM cross-reference.
#
# This file is the machine-readable twin of the human-authored vault doc at
# `Obsidian/code/allowed-licenses.md`. The vault doc is the source of truth
# for policy decisions; this toml is the runtime form consumed by the SBOM
# license cross-reference code.
#
# Sync is currently manual: when the vault doc changes, this file must be
# updated by hand and the change committed to the OWB repo. A proper CI
# sync check requires either vendoring a snapshot of the vault doc into the
# repo or an out-of-band check; both are deferred to a follow-up. The unit
# tests in `tests/sbom/test_license.py` verify this file parses correctly
# and contains expected license IDs, which catches the most common drift
# (missing or malformed entries).
#
# Origin: OWB-S107b (Sprint 21).

policy_version = 1
source_doc = "Obsidian/code/allowed-licenses.md"

# Allowed (Permissive) — no meaningful restrictions on commercial use.
# SPDX identifiers: https://spdx.org/licenses/
[allowed]
ids = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "0BSD",
    "CC0-1.0",
    "Unlicense",
    "PSF-2.0",
    "CNRI-Python",
    "Zlib",
]

# Allowed with Conditions — safe in normal use but require awareness.
[conditional]
ids = [
    "MPL-2.0",
    "BSL-1.0",
    "Artistic-2.0",
]

# Disallowed (Copyleft / Commercial Restriction) — must not be used as a
# linked dependency. CLI-only invocation exemptions are tracked in the vault
# doc, not here.
[disallowed]
ids = [
    "GPL-2.0",
    "GPL-2.0-only",
    "GPL-2.0-or-later",
    "GPL-3.0",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "AGPL-3.0",
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "LGPL-2.1",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
    "SSPL-1.0",
    "CC-BY-NC-1.0",
    "CC-BY-NC-2.0",
    "CC-BY-NC-2.5",
    "CC-BY-NC-3.0",
    "CC-BY-NC-4.0",
    "CC-BY-SA-1.0",
    "CC-BY-SA-2.0",
    "CC-BY-SA-2.5",
    "CC-BY-SA-3.0",
    "CC-BY-SA-4.0",
    "Commons-Clause",
    "EUPL-1.1",
    "EUPL-1.2",
]
