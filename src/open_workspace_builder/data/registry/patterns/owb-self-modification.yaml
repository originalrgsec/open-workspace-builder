id: "owb-self-modification"
version: "1.0.0"
type: "pattern"
author: "Open Workspace Builder"
description: "Self-modification and instruction override detection patterns"
compatibility: ">=0.1.0"

payload:
  patterns:
    - id: selfmod-001
      pattern: "(?i)modify\\s+(your|these|the)\\s+(own\\s+)?(instructions?|rules?|config)"
      severity: critical
      description: "Instruction to self-modify rules or config"
      false_positive_hint: "Legitimate in meta-programming documentation"
    - id: selfmod-002
      pattern: "(?i)rewrite\\s+(your)\\s+(system\\s+prompt|instructions?|core\\s+rules)|rewrite\\s+(this)\\s+(system\\s+prompt)"
      severity: critical
      description: "Instruction to rewrite own system prompt or instructions"
      false_positive_hint: "Casual usage like 'rewrite this prompt template' will not match"
    - id: selfmod-003
      pattern: "(?i)append.*to.*(CLAUDE\\.md|WORKSPACE\\.md|agent.config)"
      severity: warning
      description: "Instruction to modify agent config file"
      false_positive_hint: "Legitimate in workspace setup documentation"
    - id: selfmod-004
      pattern: "(?i)overwrite\\s+(the\\s+)?(config|settings|rules)"
      severity: critical
      description: "Instruction to overwrite configuration"
      false_positive_hint: "Legitimate in migration documentation"
