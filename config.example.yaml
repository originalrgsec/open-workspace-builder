# Open Workspace Builder configuration
# Copy to ~/.owb/config.yaml and customize.
# All values shown are defaults — omit any section to use defaults.
#
# CWB (Claude Workspace Builder) users: override defaults via your own config
# overlay to set agent_config, ecc.enabled, ecc.target_dir, vault.parent_dir, etc.

# ──────────────────────────────────────────────────────────────────────────────
# Target directory for the built workspace.
# ──────────────────────────────────────────────────────────────────────────────
target: output

# ──────────────────────────────────────────────────────────────────────────────
# Per-operation model strings. LiteLLM resolves provider from prefix.
# Examples: anthropic/claude-sonnet-4-20250514, openai/gpt-4o, ollama/mistral
# ──────────────────────────────────────────────────────────────────────────────
models:
  classify: ""
  generate: ""
  judge: ""
  security_scan: ""

# ──────────────────────────────────────────────────────────────────────────────
# Obsidian knowledge vault settings
# ──────────────────────────────────────────────────────────────────────────────
vault:
  name: Obsidian
  parent_dir: Context
  assistant_name: "AI assistant"
  create_bootstrap: true
  create_templates: true

# ──────────────────────────────────────────────────────────────────────────────
# ECC (Everything Claude Code) catalog — agents, commands, and rules.
# Disabled by default in OWB. CWB enables via overlay with:
#   ecc:
#     enabled: true
#     target_dir: ".claude"
# ──────────────────────────────────────────────────────────────────────────────
ecc:
  enabled: false
  source_dir: vendor/ecc
  target_dir: ".ai"
  # agents, commands, rules lists omitted for brevity — see defaults in config.py

# ──────────────────────────────────────────────────────────────────────────────
# Custom skills installed into .skills/skills/
# ──────────────────────────────────────────────────────────────────────────────
skills:
  source_dir: content/skills
  install:
    - mobile-inbox-triage
    - vault-audit
    - oss-health-check

# ──────────────────────────────────────────────────────────────────────────────
# Security scanner configuration
# ──────────────────────────────────────────────────────────────────────────────
security:
  active_patterns:
    - owb-default
  scanner_layers: [1, 2, 3]

# ──────────────────────────────────────────────────────────────────────────────
# Trust tier policy configuration
# ──────────────────────────────────────────────────────────────────────────────
trust:
  active_policies:
    - owb-default

# ──────────────────────────────────────────────────────────────────────────────
# Marketplace output format
# ──────────────────────────────────────────────────────────────────────────────
marketplace:
  format: generic

# ──────────────────────────────────────────────────────────────────────────────
# Context template files deployed into the vault parent_dir in the target.
# ──────────────────────────────────────────────────────────────────────────────
context_templates:
  deploy: true

# ──────────────────────────────────────────────────────────────────────────────
# Workspace config file — deployed to <directory>/<filename> in the target.
# CWB overrides to: directory: ".claude", filename: "CLAUDE.md"
# Legacy key "claude_md" is accepted as an alias for backward compatibility.
# ──────────────────────────────────────────────────────────────────────────────
agent_config:
  deploy: true
  directory: ".ai"
  filename: "WORKSPACE.md"

# ──────────────────────────────────────────────────────────────────────────────
# Directory paths for config, data, and credentials.
# Leave empty to auto-detect from CLI name (owb → ~/.owb/, cwb → ~/.cwb/).
# ──────────────────────────────────────────────────────────────────────────────
paths:
  config_dir: ""
  data_dir: ""
  credentials_dir: ""
