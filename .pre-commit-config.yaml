repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: trivy
        name: trivy vulnerability scan
        entry: trivy fs --scanners vuln .
        language: system
        pass_filenames: false
  - repo: https://github.com/semgrep/pre-commit
    rev: v1.156.0
    hooks:
      - id: semgrep
        args: [--config, p/default]
        types: [python]
  - repo: local
    hooks:
      - id: commit-msg-check
        name: conventional commit message
        entry: python3 scripts/commit-msg-check.py
        language: python
        stages: [commit-msg]
        always_run: true
