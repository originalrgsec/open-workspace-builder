name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  # Manual replay: re-run the full pipeline (idempotently) for an
  # existing tag. Use when a downstream step — notify_slack, in
  # particular — failed on the original tag-push invocation. Dispatch
  # with `gh workflow run release.yml --ref v1.17.0`; the workflow
  # checks out the tag ref and every job short-circuits cleanly on
  # "already done" (PyPI skip-existing, idempotent release create,
  # etc.). Do NOT race this workflow by running `gh release create`
  # manually — the workflow owns the GitHub Release object.
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: pyproject-build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  smoke:
    # Smoke-test the built wheel end-to-end: install it into a clean env
    # and verify the CLI entry point responds. The full test suite is
    # the responsibility of ci.yml, which runs `uv sync --all-extras` and
    # `pytest` on every push to main across a Python version matrix.
    # Running the full suite here again is (a) redundant and (b) bakes
    # in source-tree assumptions that do not survive running against an
    # installed wheel (see `src/open_workspace_builder/sbom/_example.py`
    # _REPO_ROOT computation).
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install wheel into clean environment
        run: |
          WHEEL=$(ls dist/*.whl | head -n1)
          pip install "${WHEEL}[sbom]"

      - name: Verify CLI entry point
        run: |
          owb --help
          owb --version

  publish:
    runs-on: ubuntu-latest
    needs: smoke
    environment: pypi
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent replay: `gh workflow run release.yml --ref vX`
          # hits this step with files PyPI already serves. Skip rather
          # than fail so downstream jobs (github_release, notify_slack)
          # can still run.
          skip-existing: true

  github_release:
    # AD-17: GitHub Releases as canonical release distribution surface.
    # Runs after PyPI publish succeeds. PyPI is the source of truth; if
    # publish fails, no Release is created. If this job fails after publish
    # succeeds, re-run the workflow or create the Release manually via
    # `gh release create` — PyPI state is not affected.
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # PEP 440 pre-release segments: a|b|rc|dev|post followed by digits
          # (e.g. 1.9.0a1, 1.9.0b2, 1.9.0rc1, 1.9.0.dev3). Canonical Python
          # package versions do not use hyphens.
          if [[ "${VERSION}" =~ (a|b|rc|dev|post)[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract CHANGELOG section
        id: changelog
        run: |
          python scripts/extract_changelog.py \
            CHANGELOG.md \
            "${{ steps.version.outputs.version }}" \
            > release-body.md
          echo "--- release body ---"
          cat release-body.md
          echo "--- end release body ---"

      - name: Install SBOM construction library
        # AD-17: the SBOM generator builds a CycloneDX BOM directly via
        # cyclonedx-python-lib rather than shelling out to pip-audit (which
        # was the scaffold approach but failed to include the subject
        # package and polluted the component list). cyclonedx-python-lib is
        # an OWB dependency via the [sbom] extra; we install it directly
        # here to avoid installing OWB itself into the host environment.
        run: pip install "cyclonedx-python-lib>=9.0,<11"

      - name: Generate project SBOM (CycloneDX)
        # AD-17: project SBOM captures OWB's own installed Python dependency
        # tree so downstream consumers can audit OWB's supply chain
        # independently of PyPI metadata. The helper script creates an
        # isolated venv, installs only the wheel into it, enumerates the
        # resulting distributions via importlib.metadata, and constructs a
        # CycloneDX 1.6 BOM with OWB as metadata.component.
        run: |
          WHEEL=$(ls dist/*.whl | head -n1)
          python scripts/generate_sbom.py \
            --wheel "$WHEEL" \
            --version "${{ steps.version.outputs.version }}" \
            --output "dist/open-workspace-builder-${{ steps.version.outputs.version }}.cdx.json"
          ls -la dist/

      - name: Create or update GitHub Release
        # Idempotent. On first tag-push: `gh release create` with full
        # notes and assets. On workflow_dispatch replay (or any retry
        # after a manual `gh release create`): detect the existing
        # release, upload any missing assets with --clobber, and
        # continue. Previously this step failed with "a release with
        # the same tag name already exists" when the sprint-close flow
        # had raced by creating the release manually (OWB-POST-S33).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          SBOM="dist/open-workspace-builder-${VERSION}.cdx.json"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "::notice::Release ${TAG} already exists; uploading any missing assets with --clobber"
            gh release upload "${TAG}" \
              dist/*.whl \
              dist/*.tar.gz \
              "${SBOM}" \
              --clobber
          else
            PRERELEASE_FLAG=""
            if [[ "${PRERELEASE}" == "true" ]]; then
              PRERELEASE_FLAG="--prerelease"
            fi
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes-file release-body.md \
              ${PRERELEASE_FLAG} \
              dist/*.whl \
              dist/*.tar.gz \
              "${SBOM}"
          fi

  notify_slack:
    # OWB-S119: Post a Block Kit notification to #owb-releases after a
    # successful release. Lives in this workflow (not a separate one)
    # because events created by GITHUB_TOKEN do not trigger other
    # workflows — a standalone release-event workflow never fires.
    #
    # Gate on publish (PyPI) rather than github_release: PyPI is the
    # source of truth per AD-17, and a benign "release already exists"
    # collision in github_release should not silence the Slack post
    # (OWB-POST-S33 — v1.17.0 race lost its Slack notification this
    # way). If github_release still fails for a real reason, the
    # Slack message still goes out and the operator can follow the
    # "GitHub Release" link to see it is missing and re-dispatch.
    runs-on: ubuntu-latest
    needs: [publish, github_release]
    if: always() && needs.publish.result == 'success'
    steps:
      - name: Derive release metadata
        id: meta
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # PEP 440 pre-release detection (matches release.yml logic)
          if [[ "${VERSION}" =~ (a|b|rc|dev|post)[0-9]+$ ]]; then
            echo "header=[PRE] OWB ${VERSION} released" >> "$GITHUB_OUTPUT"
          else
            echo "header=OWB ${VERSION} released" >> "$GITHUB_OUTPUT"
          fi

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG}"
          echo "release_url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"
          echo "pypi_url=https://pypi.org/project/open-workspace-builder/${VERSION}/" >> "$GITHUB_OUTPUT"

      - name: Fetch release body from GitHub
        id: body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" \
            --jq '.body' > /tmp/release-body.txt

          # Truncate at 2800 chars for Slack's 4000-char block limit
          BODY=$(cat /tmp/release-body.txt)
          if [[ ${#BODY} -gt 2800 ]]; then
            echo "${BODY:0:2800}…" > /tmp/release-body.txt
            echo "" >> /tmp/release-body.txt
            echo "<${{ steps.meta.outputs.release_url }}|See full release notes>" >> /tmp/release-body.txt
          fi

      - name: Build and send Block Kit payload
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_RELEASE_WEBHOOK }}
          HEADER: ${{ steps.meta.outputs.header }}
          RELEASE_URL: ${{ steps.meta.outputs.release_url }}
          PYPI_URL: ${{ steps.meta.outputs.pypi_url }}
        run: |
          if [[ -z "${SLACK_WEBHOOK}" ]]; then
            echo "::notice::SLACK_RELEASE_WEBHOOK secret not set — skipping notification"
            exit 0
          fi

          BODY=$(cat /tmp/release-body.txt)
          BODY_ESCAPED=$(echo "$BODY" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

          cat > /tmp/slack-payload.json <<EOFPAYLOAD
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "${HEADER}",
                  "emoji": false
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ${BODY_ESCAPED}
                }
              },
              {
                "type": "context",
                "elements": [
                  {"type": "mrkdwn", "text": "<${RELEASE_URL}|GitHub Release>"},
                  {"type": "mrkdwn", "text": "<${PYPI_URL}|PyPI>"}
                ]
              }
            ]
          }
          EOFPAYLOAD

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d @/tmp/slack-payload.json \
            "${SLACK_WEBHOOK}"
