# OWB-S119: Post a Block Kit notification to #owb-releases whenever a
# GitHub Release is published. Runs in parallel with other release
# workflows; failure does NOT affect PyPI publish or Release creation.
#
# Requires repo secret SLACK_RELEASE_WEBHOOK (Incoming Webhook URL
# bound to #owb-releases). See docs/contributing/release-process.md
# for provisioning and rotation instructions.
#
# OSS health gate: slackapi/slack-github-action v3.0.1, MIT license,
# GREEN across all categories. Score recorded 2026-04-11 in
# oss-health-policy-scores.md.

name: Notify Slack on Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    # Do not fail the overall workflow run if the secret is missing
    # (forks, new contributors without the secret configured).
    if: ${{ secrets.SLACK_RELEASE_WEBHOOK != '' }}
    steps:
      - name: Derive release metadata
        id: meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Header prefix for pre-releases
          if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
            echo "header=[PRE] OWB ${VERSION} released" >> "$GITHUB_OUTPUT"
          else
            echo "header=OWB ${VERSION} released" >> "$GITHUB_OUTPUT"
          fi

          # Truncate body at 2800 chars for Slack's 4000-char block limit
          # (leaves headroom for the rest of the Block Kit payload).
          if [[ ${#RELEASE_BODY} -gt 2800 ]]; then
            TRUNCATED="${RELEASE_BODY:0:2800}…\n\n<${RELEASE_URL}|See full release notes>"
          else
            TRUNCATED="${RELEASE_BODY}"
          fi
          # Write to file to avoid shell escaping issues in multiline output
          echo "${TRUNCATED}" > /tmp/slack-body.txt

          # SBOM asset URL (first .cdx.json asset, if present)
          SBOM_URL=""
          for asset in ${{ toJSON(github.event.release.assets.*.browser_download_url) }}; do
            # Strip JSON array noise
            clean=$(echo "$asset" | tr -d '[],"')
            if [[ "$clean" == *.cdx.json ]]; then
              SBOM_URL="$clean"
              break
            fi
          done
          echo "sbom_url=${SBOM_URL}" >> "$GITHUB_OUTPUT"
          echo "pypi_url=https://pypi.org/project/open-workspace-builder/${VERSION}/" >> "$GITHUB_OUTPUT"

      - name: Build Block Kit payload
        id: payload
        env:
          HEADER: ${{ steps.meta.outputs.header }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          SBOM_URL: ${{ steps.meta.outputs.sbom_url }}
          PYPI_URL: ${{ steps.meta.outputs.pypi_url }}
        run: |
          BODY=$(cat /tmp/slack-body.txt)

          # Build context elements: Release page is always present;
          # SBOM and PyPI links are conditional.
          CONTEXT_ELEMENTS="[{\"type\":\"mrkdwn\",\"text\":\"<${RELEASE_URL}|GitHub Release>\"}"
          if [[ -n "${SBOM_URL}" ]]; then
            CONTEXT_ELEMENTS="${CONTEXT_ELEMENTS},{\"type\":\"mrkdwn\",\"text\":\"<${SBOM_URL}|SBOM (CycloneDX)>\"}"
          fi
          CONTEXT_ELEMENTS="${CONTEXT_ELEMENTS},{\"type\":\"mrkdwn\",\"text\":\"<${PYPI_URL}|PyPI>\"}]"

          # Escape body for JSON embedding
          BODY_ESCAPED=$(echo "$BODY" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

          cat > /tmp/slack-payload.json <<PAYLOAD
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "${HEADER}",
                  "emoji": false
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ${BODY_ESCAPED}
                }
              },
              {
                "type": "context",
                "elements": ${CONTEXT_ELEMENTS}
              }
            ]
          }
          PAYLOAD

          echo "--- payload preview ---"
          cat /tmp/slack-payload.json
          echo "--- end preview ---"

      - name: Post to Slack
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_RELEASE_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json
