name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Run tests
        run: uv run pytest tests/ -x

  dep-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Dependency vulnerability scan (pip-audit)
        run: uv run pip-audit --strict --desc --skip-editable

      - name: Dependency malware scan (GuardDog)
        if: contains(github.event.commits.*.modified, 'pyproject.toml')
        env:
          SEMGREP_SEND_METRICS: "off"
        run: uvx guarddog pypi verify requirements.txt
